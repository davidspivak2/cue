<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/svg+xml" id="favicon" href="/light.svg" />
    <title>Cue</title>
  </head>
  <body>
    <div id="root" style="background:#09090b;min-height:100vh;"></div>
    <script>
      (function() {
        var d = document.documentElement;
        var m = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)');
        d.classList.add(m && m.matches ? 'dark' : 'light');
      })();
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
